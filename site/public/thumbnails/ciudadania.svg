  <circle cx="640" cy="360" r="280" fill="white" opacity="0.015"/>
  <polygon points="150,50 170,50 180,30 190,50 210,50 195,62 200,82 180,70 160,82 165,62" fill="white" opacity="0.025"/>
  <polygon points="1080,640 1100,640 1110,620 1120,640 1140,640 1125,652 1130,672 1110,660 1090,672 1095,652" fill="white" opacity="0.025"/>
