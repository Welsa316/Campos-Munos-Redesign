<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="220" cy="130" r="160" fill="white" opacity="0.02"/>
  <circle cx="1060" cy="580" r="200" fill="white" opacity="0.02"/>
  <circle cx="640" cy="360" r="290" fill="white" opacity="0.015"/>
  <rect x="90" y="500" width="90" height="90" rx="10" fill="white" opacity="0.015" transform="rotate(35 135 545)"/>
  <line x1="0" y1="620" x2="350" y2="720" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="950" y1="0" x2="1280" y2="190" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Graduation Cap Icon -->
  <g transform="translate(640, 340)" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cap top (mortarboard) -->
    <polygon points="0,-80 120,-30 0,20 -120,-30" fill="white" fill-opacity="0.1" stroke="white" stroke-width="4"/>
    <!-- Cap body/band -->
    <path d="M-80,-15 L-80,40 Q0,80 80,40 L80,-15" fill="white" fill-opacity="0.05"/>
    <path d="M-80,-15 L-80,40 Q0,80 80,40 L80,-15" stroke-width="3"/>
    <!-- Button on top -->
    <circle cx="0" cy="-80" r="6" fill="white" fill-opacity="0.3"/>
    <!-- Tassel -->
    <line x1="120" y1="-30" x2="120" y2="10"/>
    <line x1="120" y1="10" x2="140" y2="50"/>
    <line x1="135" y1="50" x2="145" y2="50" stroke-width="8"/>
    <!-- Decorative tassel end -->
    <line x1="136" y1="50" x2="136" y2="70" stroke-width="2"/>
    <line x1="140" y1="50" x2="140" y2="72" stroke-width="2"/>
    <line x1="144" y1="50" x2="144" y2="68" stroke-width="2"/>
  </g>
</svg>