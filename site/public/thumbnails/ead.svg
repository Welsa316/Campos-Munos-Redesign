<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="240" cy="580" r="200" fill="white" opacity="0.02"/>
  <circle cx="1040" cy="140" r="180" fill="white" opacity="0.02"/>
  <circle cx="640" cy="360" r="270" fill="white" opacity="0.015"/>
  <rect x="80" y="120" width="80" height="80" rx="8" fill="white" opacity="0.015" transform="rotate(20 120 160)"/>
  <line x1="0" y1="610" x2="340" y2="720" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="940" y1="0" x2="1280" y2="210" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Briefcase Icon -->
  <g transform="translate(640, 355)" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Briefcase body -->
    <rect x="-110" y="-50" width="220" height="140" rx="14" fill="white" fill-opacity="0.08"/>
    <rect x="-110" y="-50" width="220" height="140" rx="14"/>
    <!-- Handle -->
    <path d="M-40,-50 L-40,-75 Q-40,-90 -25,-90 L25,-90 Q40,-90 40,-75 L40,-50" fill="none" stroke-width="5"/>
    <!-- Center clasp -->
    <rect x="-18" y="-10" width="36" height="28" rx="5" fill="white" fill-opacity="0.12"/>
    <circle cx="0" cy="4" r="6" fill="white" fill-opacity="0.2"/>
    <!-- Middle line -->
    <line x1="-110" y1="15" x2="-18" y2="15" stroke-width="3" opacity="0.4"/>
    <line x1="18" y1="15" x2="110" y2="15" stroke-width="3" opacity="0.4"/>
    <!-- Document peeking out -->
    <rect x="50" y="-35" width="40" height="55" rx="3" fill="white" fill-opacity="0.06" stroke="white" stroke-width="2"/>
    <line x1="58" y1="-22" x2="82" y2="-22" stroke-width="2" opacity="0.4"/>
    <line x1="58" y1="-12" x2="78" y2="-12" stroke-width="2" opacity="0.4"/>
    <line x1="58" y1="-2" x2="75" y2="-2" stroke-width="2" opacity="0.4"/>
  </g>
</svg>