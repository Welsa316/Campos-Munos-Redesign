<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="200" cy="180" r="170" fill="white" opacity="0.02"/>
  <circle cx="1080" cy="540" r="210" fill="white" opacity="0.02"/>
  <circle cx="640" cy="360" r="280" fill="white" opacity="0.015"/>
  <rect x="1100" y="100" width="85" height="85" rx="8" fill="white" opacity="0.015" transform="rotate(30 1142 142)"/>
  <line x1="0" y1="590" x2="330" y2="720" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="950" y1="0" x2="1280" y2="230" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Family / People Icon -->
  <g transform="translate(640, 340)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Adult 1 (left) -->
    <circle cx="-55" cy="-65" r="24" fill="white" fill-opacity="0.1" stroke-width="4"/>
    <path d="M-55,-41 L-55,20" stroke-width="4"/>
    <path d="M-55,0 L-85,-20" stroke-width="3"/>
    <path d="M-55,0 L-30,-10" stroke-width="3"/>
    <path d="M-55,20 L-80,65" stroke-width="3"/>
    <path d="M-55,20 L-35,65" stroke-width="3"/>
    <!-- Adult 2 (right) -->
    <circle cx="55" cy="-65" r="24" fill="white" fill-opacity="0.1" stroke-width="4"/>
    <path d="M55,-41 L55,20" stroke-width="4"/>
    <path d="M55,0 L85,-20" stroke-width="3"/>
    <path d="M55,0 L30,-10" stroke-width="3"/>
    <path d="M55,20 L80,65" stroke-width="3"/>
    <path d="M55,20 L35,65" stroke-width="3"/>
    <!-- Child (center, smaller) -->
    <circle cx="0" cy="-35" r="18" fill="white" fill-opacity="0.1" stroke-width="3"/>
    <path d="M0,-17 L0,25" stroke-width="3"/>
    <path d="M0,5 L-20,-8" stroke-width="3"/>
    <path d="M0,5 L20,-8" stroke-width="3"/>
    <path d="M0,25 L-18,60" stroke-width="3"/>
    <path d="M0,25 L18,60" stroke-width="3"/>
    <!-- Connection arc (family bond) -->
    <path d="M-55,-95 Q0,-120 55,-95" stroke-width="2" opacity="0.4" fill="none"/>
    <!-- Heart above -->
    <path d="M0,-110 C-4,-118 -14,-118 -14,-110 C-14,-102 0,-94 0,-94 C0,-94 14,-102 14,-110 C14,-118 4,-118 0,-110Z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
  </g>
</svg>