<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="280" cy="520" r="190" fill="white" opacity="0.02"/>
  <circle cx="1020" cy="160" r="170" fill="white" opacity="0.02"/>
  <circle cx="640" cy="360" r="275" fill="white" opacity="0.015"/>
  <rect x="1080" y="550" width="80" height="80" rx="8" fill="white" opacity="0.015" transform="rotate(25 1120 590)"/>
  <line x1="0" y1="570" x2="280" y2="720" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="1000" y1="0" x2="1280" y2="170" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Embassy / Building Icon -->
  <g transform="translate(640, 350)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof / Pediment triangle -->
    <polygon points="0,-110 130,-55 -130,-55" fill="white" fill-opacity="0.08" stroke="white" stroke-width="4"/>
    <!-- Roof line -->
    <line x1="-140" y1="-55" x2="140" y2="-55" stroke-width="6"/>
    <!-- Columns -->
    <line x1="-100" y1="-50" x2="-100" y2="60" stroke-width="6"/>
    <line x1="-45" y1="-50" x2="-45" y2="60" stroke-width="6"/>
    <line x1="45" y1="-50" x2="45" y2="60" stroke-width="6"/>
    <line x1="100" y1="-50" x2="100" y2="60" stroke-width="6"/>
    <!-- Column caps -->
    <line x1="-110" y1="-50" x2="-90" y2="-50" stroke-width="3"/>
    <line x1="-55" y1="-50" x2="-35" y2="-50" stroke-width="3"/>
    <line x1="35" y1="-50" x2="55" y2="-50" stroke-width="3"/>
    <line x1="90" y1="-50" x2="110" y2="-50" stroke-width="3"/>
    <!-- Base -->
    <line x1="-130" y1="60" x2="130" y2="60" stroke-width="6"/>
    <rect x="-140" y="60" width="280" height="15" rx="3" fill="white" fill-opacity="0.06"/>
    <!-- Steps -->
    <rect x="-120" y="75" width="240" height="10" rx="2" fill="white" fill-opacity="0.04"/>
    <rect x="-110" y="85" width="220" height="10" rx="2" fill="white" fill-opacity="0.03"/>
    <!-- Door -->
    <rect x="-20" y="10" width="40" height="50" rx="4" fill="white" fill-opacity="0.1"/>
    <path d="M-20,60 L-20,10 Q-20,-10 0,-10 Q20,-10 20,10 L20,60" fill="white" fill-opacity="0.08" stroke="white" stroke-width="3"/>
    <!-- Roof decoration -->
    <circle cx="0" cy="-85" r="12" fill="white" fill-opacity="0.1" stroke="white" stroke-width="2"/>
  </g>
</svg>