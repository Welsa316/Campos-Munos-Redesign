<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="150" cy="300" r="170" fill="white" opacity="0.02"/>
  <circle cx="1100" cy="450" r="210" fill="white" opacity="0.02"/>
  <circle cx="640" cy="360" r="250" fill="white" opacity="0.015"/>
  <rect x="1100" y="80" width="70" height="70" rx="8" fill="white" opacity="0.015" transform="rotate(15 1135 115)"/>
  <line x1="0" y1="550" x2="320" y2="720" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="960" y1="0" x2="1280" y2="200" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Chain Breaking / Freedom Icon -->
  <g transform="translate(640, 350)" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left chain links -->
    <ellipse cx="-80" cy="-20" rx="22" ry="14" transform="rotate(-30 -80 -20)"/>
    <ellipse cx="-50" cy="0" rx="22" ry="14" transform="rotate(-30 -50 0)"/>
    <!-- Break point - left side -->
    <path d="M-30,8 L-15,-5" stroke-width="6"/>
    <!-- Break burst lines -->
    <line x1="-5" y1="-30" x2="5" y2="-50" stroke-width="3" opacity="0.7"/>
    <line x1="15" y1="-25" x2="30" y2="-42" stroke-width="3" opacity="0.7"/>
    <line x1="-20" y1="-35" x2="-30" y2="-55" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="-15" x2="0" y2="-35" stroke-width="3" opacity="0.5"/>
    <line x1="25" y1="-15" x2="38" y2="-30" stroke-width="3" opacity="0.5"/>
    <line x1="-15" y1="-20" x2="-22" y2="-40" stroke-width="3" opacity="0.5"/>
    <!-- Break point - right side -->
    <path d="M15,-5 L30,8" stroke-width="6"/>
    <!-- Right chain links -->
    <ellipse cx="50" cy="0" rx="22" ry="14" transform="rotate(-30 50 0)"/>
    <ellipse cx="80" cy="-20" rx="22" ry="14" transform="rotate(-30 80 -20)"/>
    <!-- Dove / bird of freedom above -->
    <g transform="translate(0, -80)" opacity="0.9">
      <path d="M0,0 Q-15,-20 -40,-15 Q-20,-10 -10,-5 Q-25,5 -45,15 Q-15,5 0,0" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
      <path d="M0,0 Q15,-20 40,-15 Q20,-10 10,-5 Q25,5 45,15 Q15,5 0,0" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
    </g>
    <!-- Wrist outlines -->
    <path d="M-110,-10 Q-110,25 -85,30 L-85,-45 Q-110,-40 -110,-10" fill="white" fill-opacity="0.05" stroke="white" stroke-width="3"/>
    <path d="M110,-10 Q110,25 85,30 L85,-45 Q110,-40 110,-10" fill="white" fill-opacity="0.05" stroke="white" stroke-width="3"/>
  </g>
</svg>