<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="170" cy="400" r="180" fill="white" opacity="0.02"/>
  <circle cx="1100" cy="300" r="200" fill="white" opacity="0.02"/>
  <circle cx="640" cy="360" r="265" fill="white" opacity="0.015"/>
  <rect x="120" y="100" width="75" height="75" rx="8" fill="white" opacity="0.015" transform="rotate(40 157 137)"/>
  <line x1="0" y1="600" x2="300" y2="720" stroke="white" stroke-width="1" opacity="0.03"/>
  <line x1="980" y1="0" x2="1280" y2="210" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Youth / Child Icon -->
  <g transform="translate(640, 330)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Child figure - head -->
    <circle cx="0" cy="-70" r="28" fill="white" fill-opacity="0.1" stroke="white" stroke-width="4"/>
    <!-- Child body -->
    <line x1="0" y1="-42" x2="0" y2="30"/>
    <!-- Arms raised (happy gesture) -->
    <path d="M0,-20 L-50,-55" stroke-width="4"/>
    <path d="M0,-20 L50,-55" stroke-width="4"/>
    <!-- Hands (small circles) -->
    <circle cx="-53" cy="-58" r="6" fill="white" fill-opacity="0.15"/>
    <circle cx="53" cy="-58" r="6" fill="white" fill-opacity="0.15"/>
    <!-- Legs -->
    <line x1="0" y1="30" x2="-30" y2="80"/>
    <line x1="0" y1="30" x2="30" y2="80"/>
    <!-- Protective arc above -->
    <path d="M-80,-100 Q0,-150 80,-100" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M-90,-90 Q0,-145 90,-90" stroke-width="2" fill="none" opacity="0.25"/>
    <!-- Small heart above child -->
    <path d="M0,-115 C-5,-125 -18,-125 -18,-115 C-18,-105 0,-95 0,-95 C0,-95 18,-105 18,-115 C18,-125 5,-125 0,-115Z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
    <!-- Ground line -->
    <line x1="-60" y1="82" x2="60" y2="82" stroke-width="2" opacity="0.3"/>
  </g>
</svg>